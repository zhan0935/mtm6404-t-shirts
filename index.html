<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>T-Shirts Store</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      color: #222;
    }

    header {
      background-color: #222;
      color: white;
      text-align: center;
      padding: 25px;
    }

    header h1 {
      margin: 0;
    }

    #root {
      max-width: 1200px;
      margin: 0 auto;
      padding: 30px 20px;
    }

    .tshirt-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 20px;
    }

    .tshirt-card {
      background-color: white;
      border-radius: 10px;
      padding: 18px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
      text-align: center;
    }

    .tshirt-card img {
      width: 100%;
      max-width: 220px;
      height: 220px;
      object-fit: cover;
      margin-bottom: 12px;
    }

    .tshirt-card h2 {
      font-size: 20px;
      margin: 10px 0;
    }

    .price {
      font-size: 18px;
      font-weight: bold;
      color: #2d7a3e;
    }

    .stock {
      margin: 10px 0;
    }

    .out-of-stock {
      color: #c62828;
      font-weight: bold;
    }

    select,
    button {
      padding: 9px;
      margin: 5px;
      font-size: 15px;
    }

    button {
      background-color: #222;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #555;
    }
  </style>
</head>

<body>
  <header>
    <h1>T-Shirts Store</h1>
  </header>

  <main id="root"></main>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-type="module" src="./t-shirts.js"></script>
</body>
</html>
